media:
  input: public/uploads
  output: /uploads

content:
  - name: homepageSections
    label: Sections de l'accueil
    path: public/content/site/sections.json
    type: file
    format: json
    fields:
      - { name: guide, label: Afficher la section Guide, type: boolean, default: true }
      - { name: events, label: Afficher la section Événements, type: boolean, default: true }
      - { name: news, label: Afficher la section Actualités, type: boolean, default: true }
      - { name: hikes, label: Afficher la section Randonnées, type: boolean, default: true }
      - { name: parkings, label: Afficher la section Parkings, type: boolean, default: true }

  - name: siteContent
    label: Contenus de structure
    path: public/content/site/site.json
    type: file
    format: json
    fields:
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: eyebrow, label: Sur-titre FR, type: string, required: false }
          - { name: eyebrowEn, label: Sur-titre EN, type: string, required: false }
          - { name: title, label: Titre FR, type: string }
          - { name: titleEn, label: Titre EN, type: string, required: false }
          - { name: description, label: Description FR, type: text }
          - { name: descriptionEn, label: Description EN, type: text, required: false }
          - name: primaryCta
            label: Bouton principal
            type: object
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: label, label: Libellé FR, type: string }
              - { name: labelEn, label: Libellé EN, type: string, required: false }
              - { name: to, label: Lien interne, type: string }
          - name: secondaryCta
            label: Bouton secondaire
            type: object
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: label, label: Libellé FR, type: string }
              - { name: labelEn, label: Libellé EN, type: string, required: false }
              - { name: to, label: Lien interne, type: string }
      - name: quickLinks
        label: Accès rapides
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Titre FR, type: string }
          - { name: titleEn, label: Titre EN, type: string, required: false }
          - { name: description, label: Description FR, type: text }
          - { name: descriptionEn, label: Description EN, type: text, required: false }
          - { name: badge, label: Badge FR, type: string, required: false }
          - { name: badgeEn, label: Badge EN, type: string, required: false }
          - { name: to, label: Lien interne, type: string }
      - name: highlights
        label: Points clés
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Titre FR, type: string }
          - { name: titleEn, label: Titre EN, type: string, required: false }
          - { name: value, label: Valeur FR, type: string, required: false }
          - { name: valueEn, label: Valeur EN, type: string, required: false }
          - { name: tag, label: Tag FR, type: string, required: false }
          - { name: tagEn, label: Tag EN, type: string, required: false }
          - { name: description, label: Description FR, type: text, required: false }
          - { name: descriptionEn, label: Description EN, type: text, required: false }
      - name: guideSections
        label: Sections du guide
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Titre FR, type: string }
          - { name: titleEn, label: Titre EN, type: string, required: false }
          - { name: summary, label: Résumé FR, type: text, required: false }
          - { name: summaryEn, label: Résumé EN, type: text, required: false }
          - name: items
            label: Cartes internes
            type: object
            list: true
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: title, label: Titre FR, type: string }
              - { name: titleEn, label: Titre EN, type: string, required: false }
              - { name: description, label: Description FR, type: text, required: false }
              - { name: descriptionEn, label: Description EN, type: text, required: false }
          - name: links
            label: Liens
            type: object
            list: true
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: label, label: Libellé FR, type: string }
              - { name: labelEn, label: Libellé EN, type: string, required: false }
              - { name: to, label: Lien interne, type: string }
      - name: contacts
        label: Contacts
        type: object
        list: true
        required: false
        fields:
          - { name: id, label: ID, type: string }
          - { name: name, label: Nom, type: string }
          - { name: role, label: Rôle FR, type: string, required: false }
          - { name: roleEn, label: Rôle EN, type: string, required: false }
          - { name: description, label: Description FR, type: text, required: false }
          - { name: descriptionEn, label: Description EN, type: text, required: false }
          - { name: phone, label: Téléphone, type: string, required: false }
          - { name: email, label: Email, type: string, required: false }
          - { name: address, label: Adresse FR, type: string, required: false }
          - { name: addressEn, label: Adresse EN, type: string, required: false }
          - { name: hours, label: Horaires FR, type: string, required: false }
          - { name: hoursEn, label: Horaires EN, type: string, required: false }
      - { name: visitorTips, label: Conseils visiteurs FR, type: string, list: true, required: false }
      - { name: visitorTipsEn, label: Conseils visiteurs EN, type: string, list: true, required: false }
      - { name: alerts, label: Alertes FR, type: string, list: true, required: false }
      - { name: alertsEn, label: Alertes EN, type: string, list: true, required: false }

  - name: news
    label: Actualités
    path: public/content/news/news.json
    type: file
    format: json
    fields:
      - name: items
        label: Actualités
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: title, label: Titre FR, type: string }
          - { name: titleEn, label: Titre EN, type: string, required: false }
          - { name: date, label: Date, type: string }
          - { name: excerpt, label: Résumé FR, type: string, required: false }
          - { name: excerptEn, label: Résumé EN, type: string, required: false }
          - { name: content, label: Contenu FR, type: rich-text }
          - { name: contentEn, label: Contenu EN, type: rich-text, required: false }
          - { name: image, label: Image, type: image, required: false }

  - name: events
    label: Événements
    path: public/content/events/events.json
    type: file
    format: json
    fields:
      - name: items
        label: Événements
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: title, label: Titre FR, type: string }
          - { name: titleEn, label: Titre EN, type: string, required: false }
          - { name: startDate, label: Date de début (AAAA-MM-JJ), type: string }
          - { name: endDate, label: Date de fin (AAAA-MM-JJ), type: string }
          - { name: location, label: Lieu, type: string }
          - { name: content, label: Description FR, type: rich-text }
          - { name: contentEn, label: Description EN, type: rich-text, required: false }
          - { name: image, label: Image, type: image, required: false }
          - name: recurrence
            label: Récurrence de l'événement
            type: object
            required: false
            fields:
              - name: frequency
                label: Type de répétition
                type: select
                required: false
                options:
                  - { label: Tous les jours, value: daily }
                  - { label: Chaque semaine, value: weekly }
                  - { label: Chaque mois, value: monthly }
                  - { label: Du lundi au vendredi, value: weekdays }
              - { name: interval, label: Tous les X cycles (laisser 1 si chaque fois), type: number, required: false, default: 1 }
              - { name: until, label: Date de fin de répétition (AAAA-MM-JJ), type: string, required: false }
              - name: weekdays
                label: Jours concernés
                type: select
                list: true
                required: false
                options:
                  - { label: Lundi, value: monday }
                  - { label: Mardi, value: tuesday }
                  - { label: Mercredi, value: wednesday }
                  - { label: Jeudi, value: thursday }
                  - { label: Vendredi, value: friday }
                  - { label: Samedi, value: saturday }
                  - { label: Dimanche, value: sunday }

  - name: hikes
    label: Randonnées
    path: public/content/hikes/hikes.json
    type: file
    format: json
    fields:
      - name: items
        label: Randonnées
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: name, label: Nom, type: string }
          - { name: distance, label: Distance, type: number }
          - { name: difficulty, label: Difficulté FR, type: string }
          - { name: difficultyEn, label: Difficulté EN, type: string, required: false }
          - { name: duration, label: Durée, type: string }
          - { name: lat, label: Latitude, type: number }
          - { name: lng, label: Longitude, type: number }
          - { name: startPoint, label: Point de départ FR, type: string }
          - { name: startPointEn, label: Point de départ EN, type: string, required: false }
          - { name: description, label: Description FR, type: rich-text }
          - { name: descriptionEn, label: Description EN, type: rich-text, required: false }
          - { name: gpx, label: Fichier GPX, type: string, required: false }

  - name: parkings
    label: Parkings
    path: public/content/parkings/parkings.json
    type: file
    format: json
    fields:
      - name: items
        label: Parkings
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: name, label: Nom, type: string }
          - { name: lat, label: Latitude, type: number }
          - { name: lng, label: Longitude, type: number }
          - { name: address, label: Adresse, type: string }
          - { name: cars, label: Voitures autorisées, type: boolean }
          - { name: minivans, label: Mini-vans autorisés, type: boolean }
          - { name: motorcycles, label: Motos autorisées, type: boolean }
          - { name: campers, label: Camping-cars autorisés, type: boolean }
          - { name: hourlyRate, label: Tarif horaire, type: string }
          - { name: dailyRate, label: Tarif journée FR, type: string }
          - { name: notes, label: Notes FR, type: string, required: false }
          - { name: notesEn, label: Notes EN, type: string, required: false }
