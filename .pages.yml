media:
  input: public/uploads
  output: /uploads

content:
  - name: homepageSections
    label: Sections de l'accueil
    path: public/content/site/sections.json
    type: file
    format: json
    fields:
      - { name: guide, label: Afficher la section Guide, type: boolean, default: true }
      - { name: events, label: Afficher la section Événements, type: boolean, default: true }
      - { name: news, label: Afficher la section Actualités, type: boolean, default: true }
      - { name: hikes, label: Afficher la section Randonnées, type: boolean, default: true }
      - { name: parkings, label: Afficher la section Parkings, type: boolean, default: true }

  - name: siteContent
    label: Contenus de structure
    path: public/content/site/site.json
    type: file
    format: json
    fields:
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: eyebrow, label: Sur-titre, type: string, required: false }
          - { name: title, label: Titre, type: string }
          - { name: description, label: Description, type: text }
          - name: primaryCta
            label: Bouton principal
            type: object
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: label, label: Libellé, type: string }
              - { name: to, label: Lien interne, type: string }
          - name: secondaryCta
            label: Bouton secondaire
            type: object
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: label, label: Libellé, type: string }
              - { name: to, label: Lien interne, type: string }
      - name: quickLinks
        label: Accès rapides
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Titre, type: string }
          - { name: description, label: Description, type: text }
          - { name: badge, label: Badge, type: string, required: false }
          - { name: to, label: Lien interne, type: string }
      - name: highlights
        label: Points clés
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Titre, type: string }
          - { name: value, label: Valeur mise en avant, type: string, required: false }
          - { name: tag, label: Tag, type: string, required: false }
          - { name: description, label: Description, type: text, required: false }
      - name: guideSections
        label: Sections du guide
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Titre, type: string }
          - { name: summary, label: Résumé, type: text, required: false }
          - name: items
            label: Cartes internes
            type: object
            list: true
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: title, label: Titre, type: string }
              - { name: description, label: Description, type: text, required: false }
          - name: links
            label: Liens
            type: object
            list: true
            required: false
            fields:
              - { name: id, label: ID, type: string, required: false }
              - { name: label, label: Libellé, type: string }
              - { name: to, label: Lien interne, type: string }
      - name: contacts
        label: Contacts
        type: object
        list: true
        required: false
        fields:
          - { name: id, label: ID, type: string }
          - { name: name, label: Nom, type: string }
          - { name: role, label: Rôle, type: string, required: false }
          - { name: description, label: Description, type: text, required: false }
          - { name: phone, label: Téléphone, type: string, required: false }
          - { name: email, label: Email, type: string, required: false }
          - { name: address, label: Adresse, type: string, required: false }
          - { name: hours, label: Horaires, type: string, required: false }
      - { name: visitorTips, label: Conseils visiteurs, type: string, list: true, required: false }
      - { name: alerts, label: Alertes, type: string, list: true, required: false }

  - name: news
    label: Actualités
    path: public/content/news/news.json
    type: file
    format: json
    fields:
      - name: items
        label: Actualités
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: title, label: Titre, type: string }
          - { name: date, label: Date, type: string }
          - { name: excerpt, label: Résumé, type: string, required: false }
          - { name: content, label: Contenu, type: rich-text }
          - { name: image, label: Image, type: image, required: false }

  - name: events
    label: Événements
    path: public/content/events/events.json
    type: file
    format: json
    fields:
      - name: items
        label: Événements
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: title, label: Titre, type: string }
          - { name: startDate, label: Date de début, type: string }
          - { name: endDate, label: Date de fin, type: string }
          - { name: location, label: Lieu, type: string }
          - { name: content, label: Description, type: rich-text }
          - { name: image, label: Image, type: image, required: false }

  - name: hikes
    label: Randonnées
    path: public/content/hikes/hikes.json
    type: file
    format: json
    fields:
      - name: items
        label: Randonnées
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: name, label: Nom, type: string }
          - { name: distance, label: Distance, type: number }
          - { name: difficulty, label: Difficulté, type: string }
          - { name: duration, label: Durée, type: string }
          - { name: lat, label: Latitude, type: number }
          - { name: lng, label: Longitude, type: number }
          - { name: startPoint, label: Point de départ, type: string }
          - { name: description, label: Description, type: rich-text }
          - { name: gpx, label: Fichier GPX, type: string, required: false }

  - name: parkings
    label: Parkings
    path: public/content/parkings/parkings.json
    type: file
    format: json
    fields:
      - name: items
        label: Parkings
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: name, label: Nom, type: string }
          - { name: lat, label: Latitude, type: number }
          - { name: lng, label: Longitude, type: number }
          - { name: address, label: Adresse, type: string }
          - { name: cars, label: Voitures autorisées, type: boolean }
          - { name: minivans, label: Mini-vans autorisés, type: boolean }
          - { name: motorcycles, label: Motos autorisées, type: boolean }
          - { name: campers, label: Camping-cars autorisés, type: boolean }
          - { name: hourlyRate, label: Tarif horaire, type: string }
          - { name: dailyRate, label: Tarif journée, type: string }
          - { name: notes, label: Notes, type: string, required: false }
