media:
  input: public/uploads
  output: /uploads

content:
  - name: news
    label: Actualités
    path: public/content/news/news.json
    type: file
    format: json
    fields:
      - name: items
        label: Actualités
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: title, label: Titre, type: string }
          - { name: date, label: Date, type: string }
          - { name: excerpt, label: Résumé, type: string, required: false }
          - { name: content, label: Contenu, type: rich-text }
          - { name: image, label: Image, type: image, required: false }

  - name: events
    label: Événements
    path: public/content/events/events.json
    type: file
    format: json
    fields:
      - name: items
        label: Événements
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: title, label: Titre, type: string }
          - { name: startDate, label: Date de début, type: string }
          - { name: endDate, label: Date de fin, type: string }
          - { name: location, label: Lieu, type: string }
          - { name: content, label: Description, type: rich-text }
          - { name: image, label: Image, type: image, required: false }

  - name: hikes
    label: Randonnées
    path: public/content/hikes/hikes.json
    type: file
    format: json
    fields:
      - name: items
        label: Randonnées
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: name, label: Nom, type: string }
          - { name: distance, label: Distance, type: number }
          - { name: difficulty, label: Difficulté, type: string }
          - { name: duration, label: Durée, type: string }
          - { name: lat, label: Latitude, type: number }
          - { name: lng, label: Longitude, type: number }
          - { name: startPoint, label: Point de départ, type: string }
          - { name: description, label: Description, type: rich-text }
          - { name: gpx, label: Fichier GPX, type: string, required: false }

  - name: parkings
    label: Parkings
    path: public/content/parkings/parkings.json
    type: file
    format: json
    fields:
      - name: items
        label: Parkings
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: number }
          - { name: name, label: Nom, type: string }
          - { name: lat, label: Latitude, type: number }
          - { name: lng, label: Longitude, type: number }
          - { name: address, label: Adresse, type: string }
          - { name: cars, label: Voitures autorisées, type: boolean }
          - { name: motorcycles, label: Motos autorisées, type: boolean }
          - { name: campers, label: Camping-cars autorisés, type: boolean }
          - { name: hourlyRate, label: Tarif horaire, type: string }
          - { name: dailyRate, label: Tarif journée, type: string }
          - { name: notes, label: Notes, type: string, required: false }
